<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Battle Render Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
canvas{display:block}
#info{position:fixed;top:10px;left:10px;color:#0f0;font:12px monospace;z-index:999;background:rgba(0,0,0,.7);padding:10px;max-width:50%;max-height:90vh;overflow-y:auto;pointer-events:none}
</style>
</head>
<body>
<div id="info"></div>
<script src="three.min.js"></script>
<script src="data.js"></script>
<script>
const info=document.getElementById('info');
function L(msg){info.innerHTML+=msg+'<br>';console.log(msg);}

const {ALL_HEROES,CHAPTERS} = window.DATA;

// === 复制自 game.js 的核心代码 ===
const scene=new THREE.Scene();scene.background=new THREE.Color(0x1a2a1a);scene.fog=new THREE.Fog(0x1a2a1a,30,55);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);camera.position.set(0,22,16);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const amb=new THREE.AmbientLight(0x404060,0.6);scene.add(amb);
const dirLight=new THREE.DirectionalLight(0xffeedd,1.0);dirLight.position.set(10,20,10);dirLight.castShadow=true;
dirLight.shadow.mapSize.set(1024,1024);dirLight.shadow.camera.near=1;dirLight.shadow.camera.far=50;
dirLight.shadow.camera.left=-25;dirLight.shadow.camera.right=25;dirLight.shadow.camera.top=25;dirLight.shadow.camera.bottom=-25;
scene.add(dirLight);scene.add(dirLight.target);
const ptLight=new THREE.PointLight(0xff8844,0.3,30);ptLight.position.set(0,5,0);scene.add(ptLight);

const _m=(c,o={})=>new THREE.MeshStandardMaterial({color:c,metalness:o.m||0,roughness:o.r||.7,...o});
const _b=(c,o={})=>new THREE.MeshBasicMaterial({color:c,...o});
function _body(g,s,bc,sc,o={}){
  const t=new THREE.Mesh(new THREE.BoxGeometry(s*.5,s*.55,s*.3),_m(bc,{m:.2}));t.position.y=s*1;t.castShadow=true;g.add(t);
  const h=new THREE.Mesh(new THREE.SphereGeometry(s*.22,10,10),_m(sc||0xffcc99));h.position.y=s*1.5;h.castShadow=true;g.add(h);
  const eM=_b(o.ec||0x222222);
  const e1=new THREE.Mesh(new THREE.SphereGeometry(s*.04,6,6),eM);e1.position.set(-s*.08,s*1.53,s*.18);g.add(e1);
  const e2=e1.clone();e2.position.x=s*.08;g.add(e2);
  const lM=_m(o.lc||bc,{m:.1});
  const l1=new THREE.Mesh(new THREE.BoxGeometry(s*.15,s*.45,s*.15),lM);l1.position.set(-s*.12,s*.35,0);l1.castShadow=true;g.add(l1);
  const l2=l1.clone();l2.position.x=s*.12;g.add(l2);
  const aM=_m(o.ac||bc,{m:.1});
  const a1=new THREE.Mesh(new THREE.BoxGeometry(s*.12,s*.45,s*.12),aM);a1.position.set(-s*.35,s*.95,0);a1.castShadow=true;g.add(a1);
  const a2=a1.clone();a2.position.x=s*.35;g.add(a2);
}

// 英雄构建器（完整复制）
const HB={
warrior(g){
  _body(g,1,0x8b1a1a,0xffcc99,{lc:0x555555});
  const sM=_m(0xaaaaaa,{m:.6,r:.3});
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.2,.15,.25),sM),{position:new THREE.Vector3(-.4,1.25,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.2,.15,.25),sM),{position:new THREE.Vector3(.4,1.25,0)}));
  const sk=_m(0xcccccc,{m:.7});
  const s1=new THREE.Mesh(new THREE.ConeGeometry(.05,.15,6),sk);s1.position.set(-.4,1.38,0);g.add(s1);
  const s2=s1.clone();s2.position.x=.4;g.add(s2);
  const bl=new THREE.Mesh(new THREE.BoxGeometry(.06,.8,.02),_m(0xcccccc,{m:.8,r:.2}));bl.position.set(.42,.9,.15);bl.rotation.z=-.1;bl.castShadow=true;g.add(bl);
  const hi=new THREE.Mesh(new THREE.BoxGeometry(.14,.06,.06),_m(0x8b4513));hi.position.set(.42,.48,.15);g.add(hi);
  const cp=new THREE.Mesh(new THREE.PlaneGeometry(.4,.5),_m(0xcc2222,{side:THREE.DoubleSide}));cp.position.set(0,.85,-.2);g.add(cp);
  const bk=new THREE.Mesh(new THREE.BoxGeometry(.52,.06,.32),_m(0x8b4513));bk.position.y=.72;g.add(bk);
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.08,.08,.01),_m(0xffd700,{m:.8})),{position:new THREE.Vector3(0,.72,.16)}));
}
};

function createGround(chId){
  const ch=CHAPTERS[chId||'ch1'];
  scene.background=new THREE.Color(ch.bgColor);scene.fog=new THREE.Fog(ch.bgColor,30,55);
  const colors={ch1:0x2d5a27,ch2:0x5a4a27,ch3:0x1a4a1a,ch4:0x4a2a1a,ch5:0x2a2a3a,ch6:0x3a1a0a,ch7:0x2a3a4a,endless:0x1a1a2a};
  const g=new THREE.PlaneGeometry(80,80,20,20);const p=g.attributes.position;for(let i=0;i<p.count;i++)p.setZ(i,Math.random()*.15);g.computeVertexNormals();
  const mesh=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:colors[chId]||0x2d5a27,roughness:.9}));mesh.rotation.x=-Math.PI/2;mesh.receiveShadow=true;scene.add(mesh);
  const pg=new THREE.PlaneGeometry(3,60);const pm=new THREE.MeshStandardMaterial({color:(colors[chId]||0x2d5a27)+0x101010,roughness:1});
  const p1=new THREE.Mesh(pg,pm);p1.rotation.x=-Math.PI/2;p1.position.y=.02;scene.add(p1);const p2=p1.clone();p2.rotation.z=Math.PI/2;scene.add(p2);
  function mkTree(){const g=new THREE.Group();
    const t=new THREE.Mesh(new THREE.CylinderGeometry(.15,.25,2,6),new THREE.MeshStandardMaterial({color:0x5a3a1a}));t.position.y=1;t.castShadow=true;g.add(t);
    const l=new THREE.Mesh(new THREE.ConeGeometry(1.2,2.5,6),new THREE.MeshStandardMaterial({color:0x1a6a1a+Math.floor(Math.random()*0x002200)}));l.position.y=2.8;l.castShadow=true;g.add(l);
    g.scale.setScalar(.7+Math.random()*.8);return g}
  function mkRock(){const m=new THREE.Mesh(new THREE.DodecahedronGeometry(.5+Math.random()*.5,0),new THREE.MeshStandardMaterial({color:0x666666,roughness:.9}));
    m.position.y=.3;m.rotation.set(Math.random(),Math.random(),Math.random());m.scale.set(1,.6,1);m.castShadow=true;return m}
  for(let i=0;i<25;i++){const t=mkTree();const a=Math.random()*Math.PI*2,d=20+Math.random()*15;t.position.set(Math.cos(a)*d,0,Math.sin(a)*d);scene.add(t)}
  for(let i=0;i<12;i++){const r=mkRock();const a=Math.random()*Math.PI*2,d=10+Math.random()*20;r.position.set(Math.cos(a)*d,0,Math.sin(a)*d);scene.add(r)}
}

function createHero(type){
  const c=ALL_HEROES[type],g=new THREE.Group();
  L('createHero: type='+type+', hasHB='+(!!HB[type])+', heroData='+JSON.stringify({name:c?.name,color:c?.color}));
  if(HB[type])HB[type](g);else{
    const bd=new THREE.Mesh(new THREE.CapsuleGeometry(.35,.6,8,12),_m(c.color,{m:.3,r:.6}));bd.position.y=1;bd.castShadow=true;g.add(bd);
    const hd=new THREE.Mesh(new THREE.SphereGeometry(.28,12,12),_m(0xffcc99));hd.position.y=1.75;hd.castShadow=true;g.add(hd);
  }
  const ring=new THREE.Mesh(new THREE.RingGeometry(.6,.75,32),_b(c.color,{side:THREE.DoubleSide,transparent:true,opacity:.35}));ring.rotation.x=-Math.PI/2;ring.position.y=.03;g.add(ring);g.userData.ring=ring;
  const glow=new THREE.Mesh(new THREE.SphereGeometry(.5,12,12),_b(c.color,{transparent:true,opacity:.06}));glow.position.y=1;glow.scale.setScalar(1.8);g.add(glow);g.userData.glow=glow;
  scene.add(g);
  L('  Hero created with '+g.children.length+' children');
  return g;
}

// === 模拟 startChapterBattle ===
L('=== Starting Battle Simulation ===');

// 清场
while(scene.children.length>0)scene.remove(scene.children[0]);
scene.add(amb);scene.add(dirLight);scene.add(dirLight.target);scene.add(ptLight);
L('Scene cleared, lights added: '+scene.children.length+' children');

try{
  createGround('ch1');
  L('Ground created: '+scene.children.length+' children');
}catch(e){L('ERROR in createGround: '+e.message);}

let heroMesh;
try{
  heroMesh=createHero('warrior');
  heroMesh.position.set(0,0,0);
  L('Hero mesh: '+(heroMesh?'OK':'NULL'));
}catch(e){L('ERROR in createHero: '+e.message);}

camera.position.set(0,22,16);
camera.lookAt(0,0,0);
renderer.setSize(innerWidth,innerHeight);
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();

L('Camera: pos=('+camera.position.x.toFixed(1)+','+camera.position.y.toFixed(1)+','+camera.position.z.toFixed(1)+')');
L('Canvas: '+renderer.domElement.width+'x'+renderer.domElement.height);
L('Scene total children: '+scene.children.length);

try{
  renderer.render(scene,camera);
  L('=== RENDER SUCCESSFUL ===');
  // Check WebGL errors
  const gl=renderer.getContext();
  const err=gl.getError();
  L('WebGL error: '+err+(err===0?' (NONE)':' (!!!)'));
}catch(e){L('RENDER ERROR: '+e.message);}

// 动画循环
const clock=new THREE.Clock();
let frameCount=0;
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  if(heroMesh){
    heroMesh.rotation.y+=dt;
    camera.position.x+=(heroMesh.position.x-camera.position.x)*3*dt;
    camera.position.z+=(heroMesh.position.z+16-camera.position.z)*3*dt;
    camera.lookAt(heroMesh.position.x,0,heroMesh.position.z);
  }
  renderer.render(scene,camera);
  frameCount++;
  if(frameCount===1)L('First loop frame rendered');
  if(frameCount===60)L('60 frames OK');
}
loop();
</script>
</body>
</html>
